syntax = "proto3";

package hello;

option go_package = "example/grpc_app/pb";

// Greeter service definition.
service Greeter {
  // SayHello sends a greeting.
  rpc SayHello (HelloRequest) returns (HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}
